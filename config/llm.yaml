llm_fallback:
  enabled: true

  # Cloud LLM (DEFAULT — used for all low-confidence classifications)
  cloud:
    enabled: true
    model: "glm-5.1:cloud"
    endpoint: "http://localhost:11434/api/chat"
    timeout_seconds: 0  # No timeout for cloud
    max_retries: 1

  # Local LLM (disabled — too slow on CPU for production use)
  local:
    enabled: false
    model: "qwen3-vl:8b"
    endpoint: "http://localhost:11434/api/chat"
    timeout_seconds: 60
    max_retries: 0

  # Doc types that should NEVER be sent to cloud (even if local fails)
  sensitive_doc_types_skip_cloud:
    - "identity_card"

  # Trigger conditions
  trigger:
    min_confidence: 0.70
    type_gap: 0.10

  # Trust model
  auto_approve_from_llm: false
  llm_lift_confidence: 0.05
  
  # Logging verbosity
  log_level: "info"