# ============================================================
# DOCUMENT TYPES — classification patterns
# ============================================================
document_types:
  identity_card:
    patterns: ["driver license", "driver's license", "passport", "social security", "ssn", "naturalization certificate", "birth certificate", "carnet identidad", "identification card", "id card", "state id"]
    filename_template: "{date}_{doc_label}_{person}_EXP-{exp_date}.{ext}"
    labels:
      default: "IDCard"
      DriverLicense: "DriverLicense"
      Passport: "Passport"
      SSN: "SSN"
      BirthCertificate: "BirthCertificate"
      NaturalizationCert: "NaturalizationCert"

  lab_requisition:
    patterns: ["ereq", "e-req", "requisition", "quest diagnostics", "labcorp", "specimen collection", "fasting", "tests ordered", "test ordered", "ordering physician", "collection date", "patient preparation"]
    filename_template: "{date}_{provider}_LabRequisition_{person}.{ext}"
    labels:
      default: "LabRequisition"

  medical_record:
    patterns: ["medical records", "clinical summary", "discharge summary", "discharge instruction", "visit summary", "encounter summary", "hospitalization", "surgery", "lab results", "lab report", "microbiology", "urine culture", "kidney", "flowsheet", "mrn", "ultrasound", "ob report", "ob 1st tri", "ruq us", "pelvic us", "ectopic pregnancy", "miscarriage", "threatened miscarriage", "laparoscopy", "operative report", "pathology report", "radiology report", "imaging report", "chest ct", "ct scan", "x-ray", "school/work excuse", "work excuse", "return to work", "return to school", "certificate to return"]
    filename_template: "{date}_{provider}_{doc_label}_{person}.{ext}"
    labels:
      default: "MedicalRecord"
      Surgery: "SurgerySummary"
      LabResults: "LabResults"
      Discharge: "DischargeSummary"
      Ultrasound: "UltrasoundReport"
      Imaging: "ImagingReport"
      Flowsheet: "Flowsheet"
      Ectopic: "EctopicPregnancy"
      Miscarriage: "MiscarriageRecord"
      WorkExcuse: "WorkExcuse"

  prescription:
    patterns: ["prescription", "rx", "medication", "pharmacy"]
    filename_template: "{date}_{provider}_Rx_{medication}_{person}.{ext}"

  eye_exam:
    patterns: ["eye exam", "eye prescription", "vision exam", "optometry", "glasses prescription"]
    filename_template: "{date}_{provider}_EyeExam_{person}.{ext}"

  school_entry:
    patterns: ["school entry exam", "school physical", "immunization record", "vaccination record", "shot record", "form 680", "form 680a", "dh 680"]
    filename_template: "{date}_{provider}_SchoolEntryExam_{person}.{ext}"

  report_card:
    patterns: ["report card", "grade report", "progress report", "interim report"]
    filename_template: "{date}_ReportCard_{grade}_{person}.{ext}"

  standardized_test:
    patterns:
      - 'standardized test'
      - 'assessment test'
      - 'state assessment'
      - 'i-Ready'
      - 'iReady'
    filename_template: "{date}_{doc_label}_{person}.{ext}"

  activity_agreement:
    patterns: ["recital agreement", "recital", "dance recital", "ballet recital", "activity agreement", "participation agreement", "costume package", "enrollment agreement", "registration form"]
    filename_template: "{date}_{provider}_{doc_label}_{person}.{ext}"
    labels:
      default: "RecitalAgreement"
      Enrollment: "EnrollmentAgreement"
      Registration: "RegistrationForm"

  religious_record:
