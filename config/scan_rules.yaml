version: 2
default_destination: "03-Resources/Scans/"
current_year: 2026

# ============================================================
# AUTO-APPROVE SETTINGS
# ============================================================
auto_approve:
  enabled: true
  # Minimum classification_confidence to auto-approve
  threshold: 0.90
  # Doc types that should NEVER be auto-approved (always require manual review)
  never_auto_approve:
    - identity_card
    - business
  # Doc types that are safe to auto-approve if confidence is high
  safe_types:
    - lab_requisition
    - medical_record
    - prescription
    - dental
    - eye_exam
    - bill
    - receipt

