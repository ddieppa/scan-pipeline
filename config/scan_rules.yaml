# ============================================================
# FILENAME HEURISTICS — handle scanner default names
# ============================================================
filename_heuristics:
  # Patterns that indicate generic scanner-assigned names (no useful info)
  scanner_defaults:
    - pattern: "^Scan\\d{4}-\\d{2}-\\d{2}_\\d{6}"
      description: "HP Scanner default (ScanYYYY-MM-DD_HHMMSS)"
      use_mtime_as_date: true
    - pattern: "^\\d{8}_\\d{6}_\\d{3}"
      description: "Numeric scan pattern (YYYYMMDD_HHMMSS_NNN)"
      use_mtime_as_date: true
    - pattern: "^\\d{8}_"
      description: "Short date prefix (YYYYMMDD_)"
      convert_date: true
      date_format: "%Y%m%d"
    - pattern: "^0000-00-00_"
      description: "Missing date placeholder"
      use_mtime_as_date: true

  # Folder name heuristics — if file is inside a named folder, use it
  folder_name_detection:
    enabled: true
    # Map common folder name patterns to metadata
    # Each rule can set: doc_type_hint, person_hint, company_hint, ambiguous (flag for user review)
    patterns:
      # Education — maps BOTH type and person
      - folder_pattern: "(?i)homework|hw"
        doc_type_hint: "Education"
        person_hint: "Isabella"  # Homework always = Bella's schoolwork
        event_hint: "Homework"
      - folder_pattern: "(?i)school|class|grade"
        doc_type_hint: "Education"

      # Vehicle
      - folder_pattern: "(?i)registration|renewal|tag|decal"
        doc_type_hint: "Vehicle"

      # Employment — employer-specific
      - folder_pattern: "(?i)expeditors"
        doc_type_hint: "Employment"
        company_hint: "Expeditors"
        person_hint: "Natalie"  # Natalie's employer
      - folder_pattern: "(?i)evaluation|recognition|employee|employment"
        doc_type_hint: "Employment"

      # Bank statements — AMBIGUOUS (Business or Personal Finance)
      - folder_pattern: "(?i)bank.*statement|checking.*statement|savings.*statement"
        doc_type_hint: "Business"  # Default, but flagged
        ambiguous: "Business_or_PersonalFinance"
        question: "Is this a business or personal bank statement?"
      - folder_pattern: "(?i)credit.*card.*statement"
        doc_type_hint: "Business"
        ambiguous: "Business_or_PersonalFinance"
        question: "Is this a business or personal credit card statement?"

      # IRS / Tax docs — always business when inside company folder
      - folder_pattern: "(?i)irs|ein|s-corp|tax"
        doc_type_hint: "Business"

      # Business — company folder pattern
      - folder_pattern: "(?i)business.*companies|companies"
        doc_type_hint: "Business"
      - folder_pattern: "(?i)corporation.*docs|corporation"
        doc_type_hint: "Business"
      - folder_pattern: "(?i)bofa|bank.*of.*america|bank.*statement"
        doc_type_hint: "Business"
      - folder_pattern: "(?i)sunbiz|division.*corporations|dept.*state"
        doc_type_hint: "Business"

      # Medical / Doctor — strong hint that contents are medical records
      - folder_pattern: "(?i)/\\b(doctor|medical|hospital|clinic|er|emergency)\\b/|\\b(doctor|medical|hospital|clinic)\\b/"
        doc_type_hint: "MedicalRecord"

      # Creative / Photos
      - folder_pattern: "(?i)\\b(pics?|photos?|pictures?)\\b"
        doc_type_hint: "Creative_Work"
        extract_event: true  # Flag: look for event name in sibling/parent folders

      # Business-specific companies
      - folder_pattern: "(?i)realtor|realty|real estate|frec"
        doc_type_hint: "Business"
      - folder_pattern: "(?i)nd.?tek|nand.?d|tek solutions|nd_tek"
        doc_type_hint: "Business"
        company_hint: "NAndD Tek Solutions"
        person_hint: "Daniel"

  # Person detection from folder/file paths
  path_person_detection:
    enabled: true
    patterns:
      - pattern: "(?i)nany|natalie"
        person: "Natalie"
      - pattern: "(?i)bella|isabella"
        person: "Isabella"
      - pattern: "(?i)daniel|dieppa"
        person: "Daniel"
      - pattern: "(?i)nala"
        person: "Nala"

# ============================================================
# ARCHIVE CATEGORIES — what gets archived vs. kept active
# ============================================================
routing:
  archive_categories: ["Dental", "Hospital", "Lab", "Insurance", "AutoInsurance", "Auto", "Vehicle", "Home", "Employment", "Activities"]
  archive_templates:
    Insurance: "04-Archives/Finance/Insurance/{person}/{year}/"
    default: "04-Archives/Finance/{category}/{person}/{year}/"
    Vehicle: "04-Archives/Vehicles/{subcategory}/{year}/"
    Employment: "04-Archives/Employment/{date_range}_{company}/"
    Home: "04-Archives/Home/{subcategory}/"

  # Medication map: canonical generic names, brand names, and aliases
  # Used by _extract_medication() to normalize OCR-extracted medication names
  # and to fill in brand names when only the generic is found in text.
  medication_map:
    aripiprazole:
      canonical: "Aripiprazole"
      brand: "Abilify"
      aliases: ["aripiprazole", "abilify", "abilify maintena", "abilify discmelt"]
    escitalopram:
      canonical: "Escitalopram"
      brand: "Lexapro"
      aliases: ["escitalopram", "lexapro", "lexapro solution"]
    fluoxetine:
      canonical: "Fluoxetine"
      brand: "Prozac"
      aliases: ["fluoxetine", "prozac", "prozac weekly", "sarafem"]
    sertraline:
      canonical: "Sertraline"
      brand: "Zoloft"
      aliases: ["sertraline", "zoloft"]
    methylphenidate:
      canonical: "Methylphenidate"
      brand: "Ritalin"
      aliases: ["methylphenidate", "ritalin", "concerta", "ritalin la", "metadate", "daytrana"]
    lisdexamfetamine:
